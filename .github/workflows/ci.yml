# N-17: CI/CD básico — lint + tests en push/PR
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check shared/ apps/ tests/ || true

      - name: Run tests
        run: pytest tests/shared/test_indicators.py tests/shared/test_models.py -v --tb=short
        env:
          # Tests unitarios (indicators, models) no necesitan DB ni Alpaca
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          ALPACA_API_KEY: "placeholder"
          ALPACA_SECRET_KEY: "placeholder"
          HUGGINGFACE_TOKEN: "placeholder"
