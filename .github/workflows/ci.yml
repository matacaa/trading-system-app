# N-17: CI/CD básico — lint + tests en push/PR
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check shared/ apps/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          # Tests que no necesitan Supabase/Alpaca
          # Los smoke tests de indicators no requieren credenciales
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_KEY: "placeholder"
          ALPACA_API_KEY: "placeholder"
          ALPACA_SECRET_KEY: "placeholder"
          HUGGINGFACE_TOKEN: "placeholder"
