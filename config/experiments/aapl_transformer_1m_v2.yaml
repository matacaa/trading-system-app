experiment:
  name: "aapl_transformer_1m_v1"
  task: "classification"

model:
  name: "transformer"
  params:
    d_model: 32
    nhead: 4
    num_layers: 1
    dropout: 0.1
    sequence_length: 10

data:
  tickers: ["AAPL"]
  context_tickers: []
  tables: ["silver_features_1m"]
  columns:
    - ema_9
    - ema_12
    - ema_21
    - rsi_14
    - macd_line
    - macd_signal
    - bb_pct
    - bb_width
    - vwap
    - atr_14
    - returns_5
    - volume_norm
  target: "returns"
  target_threshold: 0
  train_start: "2026-04-10"
  train_end: "2026-04-15"
  test_start: "2026-04-16"
  test_end: "2026-04-17"
  dropna: true
  normalize: true
  source: "silver"

pytorch:
  epochs: 30
  batch_size: 16
  learning_rate: 0.0001

output:
  save_model: true
  save_predictions: true
  save_metrics: true
  metrics: ["accuracy", "f1", "precision", "recall", "roc_auc"]
